<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Monte Carlo π</title>

    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/p5.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>

        <h1>Monte Carlo π Visualization</h1>

        <p class="subtitle">
            Aproximação estocástica de π utilizando amostragem aleatória.
            A convergência ocorre proporcionalmente a 1/√n.
        </p>

        <div class="formula">
            π ≈ 4 · (pontos dentro / pontos totais)
        </div>

    </header>

    <div class="canvas-container" id="canvas-container"></div>

    <div class="controls">

        <label>
            Velocidade da Simulação
        </label>

    </div>

    <div class="footer">
        Simulação interativa usando p5.js
    </div>

    <script src="sketch.js"></script>

</body>

</html>
